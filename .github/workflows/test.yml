name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Create test database
        run: |
          python scripts/create_test_db.py --rows 500

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=openalex_local --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Test CLI
        run: |
          openalex-local --help
          openalex-local status || true

  install-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Bare install + import smoke
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
          .venv/bin/python -c "import openalex_local"
